name: 🎨 Frontend CI/CD (Vue)

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      # Only trigger if Vue files change
      - 'backend/web/modules/custom/vue_intranet_widget/vue-app/**'

jobs:
  lint:
    name: 🔎 Type-Check Vue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/web/modules/custom/vue_intranet_widget/vue-app/package-lock.json
      - name: Install & Lint
        run: |
          cd backend/web/modules/custom/vue_intranet_widget/vue-app
          npm ci
          npm run build-only

  build:
    name: 📦 Build Production Assets
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile Vue
        run: |
          cd backend/web/modules/custom/vue_intranet_widget/vue-app
          npm ci
          npm run build
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vue-production-assets
          path: backend/web/modules/custom/vue_intranet_widget/assets/

  deploy:
    name: 🚀 Deploy Frontend
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # (Frontend only: download your artifact here)

      - name: 🟡 Deploy to STAGING
        if: github.ref == 'refs/heads/dev'
        run: |
          echo "Deploying to STAGING environment..."
          # Your staging deployment script goes here
          # e.g., scp files to staging.neocosmo.com

      - name: 🟢 Deploy to PRODUCTION
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to PRODUCTION environment..."
          # Your production deployment script goes here
          # e.g., scp files to app.neocosmo.com
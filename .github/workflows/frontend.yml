name: 🎨 Frontend CI/CD (Vue)

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'backend/web/modules/custom/vue_intranet_widget/vue-app/**'
  
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'backend/web/modules/custom/vue_intranet_widget/vue-app/**'

jobs:
  lint:
    name: 🔎 Type-Check Vue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/web/modules/custom/vue_intranet_widget/vue-app/package-lock.json
      - name: Install & Lint
        run: |
          cd backend/web/modules/custom/vue_intranet_widget/vue-app
          npm ci
          npm run build-only

  build:
    name: 📦 Build Production Assets
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # FIX: We must set up Node 20 again because this is a fresh server!
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/web/modules/custom/vue_intranet_widget/vue-app/package-lock.json

      - name: Compile Vue
        run: |
          cd backend/web/modules/custom/vue_intranet_widget/vue-app
          npm ci
          npm run build
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vue-production-assets
          path: backend/web/modules/custom/vue_intranet_widget/assets/

  deploy-staging:
    name: 🟡 Auto-Deploy to STAGING
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vue-production-assets
      - name: Deploy
        run: echo "Automatically deploying to Staging..."

  deploy-production:
    name: 🟢 Manual Deploy to PRODUCTION
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production 
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vue-production-assets
      - name: Deploy
        run: echo "Deploying to Production after human approval..."
name: 🎨 Frontend CI/CD (Vue)

on:
  # Triggers on ALL branches and PRs (if these paths change)
  push:
    paths:
      - 'backend/web/modules/custom/vue_intranet_widget/vue-app/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'backend/web/modules/custom/vue_intranet_widget/vue-app/**'
      - '.github/workflows/frontend.yml'

jobs:
  # ---------------------------------------------------------
  # 1. FAST CHECKS: Runs on EVERY Push and PR
  # ---------------------------------------------------------
  fast-checks:
    name: ⚡ Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/web/modules/custom/vue_intranet_widget/vue-app
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/web/modules/custom/vue_intranet_widget/vue-app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: 🔎 Lint (Type-Check)
        run: npm run build-only

      - name: 🧪 Unit Tests (Vitest)
        run: npm run test:unit

  # ---------------------------------------------------------
  # 2. BUILD: Runs ONLY on merge to Dev/Main
  # ---------------------------------------------------------
  build:
    name: 📦 Build Production Assets
    needs: fast-checks
    runs-on: ubuntu-latest
    # This ensures it ONLY runs when code is pushed/merged directly into dev or main
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    defaults:
      run:
        working-directory: backend/web/modules/custom/vue_intranet_widget/vue-app
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/web/modules/custom/vue_intranet_widget/vue-app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Compile Vue
        run: npm run build
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vue-production-assets
          path: backend/web/modules/custom/vue_intranet_widget/assets/

  # ---------------------------------------------------------
  # 3a. DEPLOY (STAGING)
  # ---------------------------------------------------------
  deploy-staging:
    name: 🟡 Auto-Deploy to STAGING
    needs: build 
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vue-production-assets
      - name: Deploy
        run: echo "Automatically deploying to Staging..."

  # ---------------------------------------------------------
  # 3b. DEPLOY (PRODUCTION)
  # ---------------------------------------------------------
  deploy-production:
    name: 🟢 Manual Deploy to PRODUCTION
    needs: build 
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production 
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vue-production-assets
      - name: Deploy
        run: echo "Deploying to Production after human approval..."
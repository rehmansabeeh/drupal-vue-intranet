name: ⚙️ Backend CI/CD (Drupal)

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      # Trigger on backend changes...
      - 'backend/**'
      # ...BUT ignore changes that only happen in the Vue app
      - '!backend/web/modules/custom/vue_intranet_widget/vue-app/**'

jobs:
  lint:
    name: 🔎 PHP Lint & Config Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Syntax Check
        run: find backend -type f -name "*.php" -o -name "*.module" | xargs -n 1 php -l
      
      # (Optional) If you have Composer, you would run 'composer validate' here

  deploy:
    name: 🚀 Deploy Backend
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      

      - name: 🟡 Deploy to STAGING
        if: github.ref == 'refs/heads/dev'
        run: |
          echo "Deploying to STAGING environment..."
          # Your staging deployment script goes here
          # e.g., scp files to staging.neocosmo.com

      - name: 🟢 Deploy to PRODUCTION
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to PRODUCTION environment..."
          # Your production deployment script goes here
          # e.g., scp files to app.neocosmo.com
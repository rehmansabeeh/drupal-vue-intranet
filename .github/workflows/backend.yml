name: ⚙️ Backend CI/CD (Drupal)

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'backend/**'
      - '!backend/web/modules/custom/vue_intranet_widget/vue-app/**'
      - '.github/workflows/backend.yml'
      
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'backend/**'
      - '!backend/web/modules/custom/vue_intranet_widget/vue-app/**'
      - '.github/workflows/backend.yml'

jobs:
  lint:
    name: 🔎 PHP Lint & Config Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Syntax Check
        run: find backend -type f -name "*.php" -o -name "*.module" | xargs -n 1 php -l

  deploy-staging:
    name: 🟡 Auto-Deploy Backend to STAGING
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Backend & Sync Config
        run: |
          echo "Automatically deploying PHP to Staging..."
          echo "Running 'drush cim -y' to sync Drupal configuration..."

  deploy-production:
    name: 🟢 Manual Deploy Backend to PRODUCTION
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production 
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Backend & Sync Config
        run: |
          echo "Deploying PHP to Production after human approval..."
          echo "Running 'drush cim -y' to sync Drupal configuration..."